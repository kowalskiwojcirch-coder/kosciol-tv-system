<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        /* Import czcionki imitującej punkty LED */
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; 
            background: #050505; /* Bardzo głęboka czerń matrycy */
            color: #ff8000; /* Klasyczny pomarańcz LED */
            height: 100vh; width: 100vw; 
            overflow: hidden;
            font-family: 'DotGothic16', sans-serif;
        }

        /* Tło imitujące fizyczną strukturę matrycy (siatka modułów) */
        .matrix-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle, rgba(255,128,0,0.02) 1px, transparent 1px),
                linear-gradient(to right, #111 1px, transparent 1px),
                linear-gradient(to bottom, #111 1px, transparent 1px);
            background-size: 8px 8px, 40px 40px, 40px 40px;
            z-index: 1;
            pointer-events: none;
        }

        /* GWIAZDKI - CHUDE I CZYSTE */
        .corner-star {
            position: absolute; 
            font-size: 80px; 
            color: #ff8000;
            opacity: 0; 
            z-index: 20; 
            transition: opacity 0.2s ease-in-out;
            font-weight: 100;
            /* Efekt pojedynczych diod */
            text-shadow: 0 0 5px rgba(255, 128, 0, 0.8);
        }
        
        body.no-text .corner-star { opacity: 0.6; }
        .tl { top: 30px; left: 40px; } .tr { top: 30px; right: 40px; }
        .bl { bottom: 30px; left: 40px; } .br { bottom: 30px; right: 40px; }

        /* KONTENER TEKSTU */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s ease-in-out;
            z-index: 10;
        }

        #text-shifter {
            display: inline-block;
            white-space: pre-wrap;
            text-align: left;
            line-height: 1.1; 
            font-size: 110px; 
            letter-spacing: 4px;
            text-transform: uppercase;
            
            /* EFEKT DIOD: Tekst rysowany kropkami */
            background: radial-gradient(circle, #ff8000 35%, transparent 45%);
            background-size: 6px 6px;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* Subtelna poświata całego napisu */
            filter: drop-shadow(0 0 2px rgba(255, 128, 0, 0.5));
        }

        /* Skanowanie linii (stary typ odświeżania) */
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            z-index: 15; pointer-events: none;
        }

        .fade-hidden { opacity: 0 !important; }
    </style>
</head>
<body class="no-text">

    <div class="matrix-grid"></div>
    <div class="scanlines"></div>

    <div class="corner-star tl">*</div><div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div><div class="corner-star br">*</div>
    
    <div id="viewport">
        <div id="text-shifter"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const shifter = document.getElementById('text-shifter');
        const viewport = document.getElementById('viewport');
        const body = document.body;

        function forceScale() {
            shifter.style.transform = "scale(1)";
            const vW = window.innerWidth * 0.9; 
            const vH = window.innerHeight * 0.85; 
            const tW = shifter.offsetWidth;
            const tH = shifter.offsetHeight;
            const finalScale = Math.min(vW / tW, vH / tH);
            shifter.style.transform = `scale(${finalScale})`;
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text : "";
                viewport.classList.add('fade-hidden');

                setTimeout(() => {
                    shifter.innerText = content;
                    if (content.trim() === "") {
                        body.classList.add('no-text');
                    } else {
                        body.classList.remove('no-text');
                        forceScale();
                    }
                    requestAnimationFrame(() => {
                        viewport.classList.remove('fade-hidden');
                    });
                }, 200); 
            }
        };

        window.onresize = forceScale;
        window.onload = forceScale;
    </script>
</body>
</html>
