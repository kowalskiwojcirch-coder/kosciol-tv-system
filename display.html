<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        /* Czcionka o stałej szerokości, idealna do kropkowania */
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; 
            background: #000; /* Głęboka czerń tła */
            color: #ffaa00; /* Jasny, "gorący" bursztyn LED */
            height: 100vh; width: 100vw; 
            overflow: hidden;
            font-family: 'DotGothic16', sans-serif;
        }

        /* Subtelna tekstura fizycznych modułów LED w tle */
        .led-panel-texture {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px; /* Rozmiar pojedynczego modułu kwadratowego */
            z-index: 1;
        }

        /* GWIAZDKI - CIENKIE, ELEGANCKIE */
        .corner-star {
            position: absolute; 
            font-size: 120px; 
            color: #ffaa00;
            opacity: 0; 
            z-index: 20; 
            transition: opacity 0.2s ease-in-out;
            font-weight: 100;
            text-shadow: 0 0 15px rgba(255, 170, 0, 0.6);
        }
        
        body.no-text .corner-star { opacity: 0.7; }
        .tl { top: 20px; left: 30px; } .tr { top: 20px; right: 30px; }
        .bl { bottom: 20px; left: 30px; } .br { bottom: 20px; right: 30px; }

        /* KONTENER TEKSTU */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s ease-in-out;
            z-index: 10;
        }

        #text-shifter {
            display: inline-block;
            white-space: pre-wrap;
            text-align: left;
            line-height: 1.15; 
            font-size: 100px; 
            letter-spacing: 2px;
            text-transform: uppercase;
            
            /* EFEKT PUNKTÓW LED (Raster kropkowy) */
            background: radial-gradient(circle, #ffaa00 40%, #cc8800 50%, transparent 65%);
            background-size: 7px 7px; /* Wielkość fizyczna diody */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* MOCNA POŚWIATA (Efekt żarzenia się diody) */
            filter: drop-shadow(0 0 3px rgba(255, 170, 0, 0.8)) 
                    drop-shadow(0 0 10px rgba(255, 136, 0, 0.3));
        }

        /* Efekt odświeżania matrycy (bardzo subtelny) */
        .matrix-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }

        .fade-hidden { opacity: 0 !important; }
    </style>
</head>
<body class="no-text">

    <div class="led-panel-texture"></div>
    <div class="matrix-overlay"></div>

    <div class="corner-star tl">*</div><div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div><div class="corner-star br">*</div>
    
    <div id="viewport">
        <div id="text-shifter"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const shifter = document.getElementById('text-shifter');
        const viewport = document.getElementById('viewport');
        const body = document.body;

        function forceScale() {
            shifter.style.transform = "scale(1)";
            const vW = window.innerWidth * 0.88; 
            const vH = window.innerHeight * 0.85; 
            const tW = shifter.offsetWidth;
            const tH = shifter.offsetHeight;
            const finalScale = Math.min(vW / tW, vH / tH);
            shifter.style.transform = `scale(${finalScale})`;
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text : "";
                viewport.classList.add('fade-hidden');

                setTimeout(() => {
                    shifter.innerText = content;
                    if (content.trim() === "") {
                        body.classList.add('no-text');
                    } else {
                        body.classList.remove('no-text');
                        forceScale();
                    }
                    requestAnimationFrame(() => {
                        viewport.classList.remove('fade-hidden');
                    });
                }, 200); 
            }
        };

        window.onresize = forceScale;
        window.onload = forceScale;
    </script>
</body>
</html>
