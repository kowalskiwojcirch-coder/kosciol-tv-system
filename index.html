<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosciol-TV-System | Panel Operatora</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #ff9d00;
            --accent-hover: #e58f00;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --danger: #d32f2f;
            --success: #388e3c;
            --border: #333;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }

        /* NAGŁÓWEK */
        header {
            background: var(--card-bg);
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { margin: 0; font-size: 18px; letter-spacing: 1px; color: var(--accent); }
        .status-badge { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #333; color: #bbb; }
        .status-online { background: rgba(56, 142, 60, 0.2); color: #4caf50; border: 1px solid #388e3c; }

        /* GŁÓWNY UKŁAD */
        main {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            padding: 20px;
            flex: 1;
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* EDYCJA */
        .editor-area { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        textarea {
            flex: 1;
            background: #111;
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--accent); }

        /* PODGLĄD */
        .preview-area { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #preview-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border: 2px solid #222;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 24px;
            padding: 40px;
            white-space: pre-wrap;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
        }

        /* PRZYCISKI */
        .controls { padding: 20px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 13px;
        }

        .btn-primary { background: var(--accent); color: #000; width: 100%; font-size: 16px; padding: 18px; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(1px); }

        .btn-secondary { background: #333; color: #fff; flex: 1; }
        .btn-secondary:hover { background: #444; }

        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); width: 100%; margin-top: 10px; }
        .btn-outline:hover { border-color: var(--danger); color: var(--danger); }

        #slide-counter { color: var(--accent); font-family: monospace; font-size: 16px; }

        /* CIENIE LED */
        .led-text { text-shadow: 0 0 10px rgba(255, 157, 0, 0.5); }
    </style>
</head>
<body>

<header>
    <h1>KOSCIOL-TV <span style="font-weight: 100; opacity: 0.6;">SYSTEM</span></h1>
    <div id="status" class="status-badge">OCZEKIWANIE</div>
</header>

<main>
    <div class="card">
        <div class="card-header">Przygotowanie Pieśni</div>
        <div class="editor-area">
            <textarea id="input-text" placeholder="Wpisz tekst tutaj...&#10;&#10;Pusta linia oddziela slajdy."></textarea>
            <button onclick="loadText()" class="btn-secondary" style="margin-top: 15px;">Wczytaj do systemu</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Podgląd i Sterowanie Live</div>
        <div class="preview-area">
            <div id="preview-box" class="led-text">Gotowy do pracy...</div>
        </div>
        
        <div class="controls">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div class="btn-group" style="margin-bottom: 0;">
                    <button class="btn-secondary" onclick="prevSlide()">◄ Wstecz</button>
                    <button class="btn-secondary" onclick="nextSlide()">Dalej ►</button>
                </div>
                <div id="slide-counter">SLAJD: 0 / 0</div>
            </div>

            <button class="btn-primary" onclick="sendToTV()">WYSYŁAJ NA EKRAN TV</button>
            <button class="btn-outline" onclick="hideFromTV()">WYGAŚ EKRAN (SAME GWIAZDKI)</button>
        </div>
    </div>
</main>

<script>
    const bc = new BroadcastChannel('church_system');
    let slides = [];
    let currentSlide = 0;
    const statusBadge = document.getElementById('status');

    function loadText() {
        const raw = document.getElementById('input-text').value;
        slides = raw.split(/\n\s*\n/).filter(s => s.trim() !== "");
        currentSlide = 0;
        updateUI();
    }

    function updateUI() {
        const display = document.getElementById('preview-box');
        const info = document.getElementById('slide-counter');
        
        if (slides.length > 0) {
            display.innerText = slides[currentSlide];
            info.innerText = `SLAJD: ${currentSlide + 1} / ${slides.length}`;
        } else {
            display.innerText = "Wpisz tekst i kliknij wczytaj...";
            info.innerText = "SLAJD: 0 / 0";
        }
    }

    function prevSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            updateUI();
        }
    }

    function nextSlide() {
        if (currentSlide < slides.length - 1) {
            currentSlide++;
            updateUI();
        }
    }

    // --- FUNKCJE TRANSMISJI ---
    function sendToTV() {
        if (slides.length > 0) {
            bc.postMessage({ action: 'update', text: slides[currentSlide] });
            
            // Efekt wizualny statusu
            statusBadge.innerText = "TRANSMISJA LIVE";
            statusBadge.className = "status-badge status-online";
        }
    }

    function hideFromTV() {
        bc.postMessage({ action: 'update', text: '' });
        
        // Efekt wizualny statusu
        statusBadge.innerText = "EKRAN WYGASZONY";
        statusBadge.className = "status-badge";
    }
</script>

</body>
</html>
