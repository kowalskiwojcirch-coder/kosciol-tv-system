<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosciol-TV | Panel Operatora</title>
    <style>
        :root {
            --accent: #ff9d00;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #e0e0e0;
            --danger: #ff4444;
            --success: #2e7d32;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 350px;
            background-color: var(--card);
            padding: 30px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h1 {
            font-size: 1.2rem;
            color: var(--accent);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .btn {
            padding: 16px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary { background: var(--accent); color: #000; width: 100%; font-size: 1rem; }
        .btn-primary:hover { background: #e58f00; transform: translateY(-2px); }
        
        .btn-outline { background: #252525; border: 1px solid var(--border); color: #ccc; }
        .btn-outline:hover { background: #333; border-color: var(--accent); color: var(--accent); }

        .btn-danger { color: #888; border: 1px solid #333; background: transparent; margin-top: auto; }
        .btn-danger:hover { color: var(--danger); border-color: var(--danger); }

        /* Monitor Statusu */
        .status-pill {
            background: #000;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status-label { font-size: 0.7rem; color: #555; text-transform: uppercase; }
        .status-value { font-family: 'Consolas', monospace; font-size: 1.1rem; color: var(--accent); }

        /* Edytor */
        .main {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
        }

        .editor-header {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .editor-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        textarea {
            flex-grow: 1;
            background: #000;
            color: var(--accent);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 30px;
            font-size: 2rem;
            line-height: 1.4;
            resize: none;
            outline: none;
            font-family: 'Arial', sans-serif;
            font-weight: 100;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            transition: border-color 0.3s;
        }

        textarea:focus { border-color: var(--accent); }

        .live-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .hint { color: #555; font-size: 0.85rem; font-style: italic; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>KOSCIOL-TV</h1>
    
    <button class="btn btn-outline" onclick="window.open('display.html', 'TV', 'width=1280,height=720')">
        🖥️ Otwórz ekran TV
    </button>

    <div class="status-pill">
        <div class="status-label">Aktualny Slajd</div>
        <div id="slideInfo" class="status-value">SLAJD: 0 / 0</div>
    </div>

    <div class="status-pill">
        <div class="status-label">Obłożenie Slajdu</div>
        <div id="lineCount" class="status-value">LINIE: 0 / 8</div>
    </div>

    <div style="margin-top: 20px;">
        <div class="status-label" style="margin-bottom: 10px;">Sterowanie Emisją</div>
        <div class="live-controls">
            <button class="btn btn-outline" onclick="changeSlide(-1)">◀ Wstecz</button>
            <button class="btn btn-outline" onclick="changeSlide(1)">Dalej ▶</button>
        </div>
        <button class="btn btn-primary" style="margin-top: 15px;" onclick="updateTV()">🚀 WYŚLIJ NA TV</button>
        <button class="btn btn-outline" style="margin-top: 10px; width: 100%;" onclick="hideTV()">✖ SCHOWAJ TEKST</button>
    </div>

    <button class="btn btn-danger" onclick="clearAll()">Wyczyść wszystko</button>
</div>

<div class="main">
    <div class="editor-header">
        <div class="hint">Wskazówka: Użyj podwójnego Enteru, aby stworzyć nowy slajd.</div>
        <div id="liveIndicator" style="color: #444; font-weight: bold; font-size: 0.8rem; text-transform: uppercase;">● Standby</div>
    </div>
    <div class="editor-container">
        <textarea id="editor" placeholder="Wpisz pieśń tutaj..." oninput="processText()"></textarea>
    </div>
</div>

<script>
    const bc = new BroadcastChannel('church_system');
    const editor = document.getElementById('editor');
    const liveIndicator = document.getElementById('liveIndicator');
    let slides = [];
    let currentIdx = 0;

    function processText() {
        const text = editor.value;
        slides = text.split(/\n\s*\n/).filter(s => s.trim() !== "");
        
        // Znajdź linie w aktualnym slajdzie (tam gdzie kursor)
        const pos = editor.selectionStart;
        const textBeforeCursor = editor.value.substring(0, pos);
        const currentEditIdx = textBeforeCursor.split(/\n\s*\n/).length - 1;
        
        if (slides[currentEditIdx]) {
            const lines = slides[currentEditIdx].split('\n').length;
            const lineLabel = document.getElementById('lineCount');
            lineLabel.innerText = `LINIE: ${lines} / 8`;
            lineLabel.style.color = lines > 8 ? "var(--danger)" : "var(--accent)";
        }
        
        updateSlideInfo();
    }

    function updateSlideInfo() {
        document.getElementById('slideInfo').innerText = `SLAJD: ${slides.length > 0 ? currentIdx + 1 : 0} / ${slides.length}`;
    }

    function updateTV() {
        if (slides.length === 0) return;
        const content = slides[currentIdx] || "";
        bc.postMessage({ action: 'update', text: content.trim() });
        
        liveIndicator.innerText = "● LIVE ON TV";
        liveIndicator.style.color = "var(--accent)";
        updateSlideInfo();
    }

    function hideTV() {
        bc.postMessage({ action: 'update', text: '' });
        liveIndicator.innerText = "● STANDBY (Stars Only)";
        liveIndicator.style.color = "#444";
    }

    function changeSlide(dir) {
        if (slides[currentIdx + dir] !== undefined) {
            currentIdx += dir;
            updateTV(); // Automatyczna aktualizacja przy zmianie slajdu
        }
    }

    function clearAll() {
        if(confirm("Czy na pewno wyczyścić cały tekst?")) {
            editor.value = '';
            slides = [];
            currentIdx = 0;
            hideTV();
            processText();
        }
    }

    // Obsługa klawiatury
    window.addEventListener('keydown', (e) => {
        if (document.activeElement !== editor) {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                changeSlide(1);
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                changeSlide(-1);
            }
            if (e.key === 'Enter') {
                updateTV();
            }
            if (e.key === 'Escape') {
                hideTV();
            }
        }
    });

    processText();
</script>
</body>
</html>
